baseURL: "https://gaiagis.org/"
title: "Gaia"
summaryLength: 35

markup:
  goldmark:
    renderer:
      unsafe: true

defaultContentLanguage: en
defaultContentLanguageInSubdir: true
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

languages:
  en:
    languageName: English
    languageCode: en
    weight: 1
    contentDir: content/en
    params:
      description: "AI, system engineering, and software delivery for companies operating in complex environments."
  it:
    languageName: Italiano
    languageCode: it
    weight: 2
    contentDir: content/it
    params:
      description: "Partner ingegneristico per sistemi complessi, piattaforme AI e modernizzazione legacy. CTO as a Service."
  pt:
    languageName: Português
    languageCode: pt
    weight: 3
    contentDir: content/pt
    params:
      description: "Parceiro de engenharia para sistemas complexos, plataformas de IA e modernizacao de legados. CTO as a Service."
