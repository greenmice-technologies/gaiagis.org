enable: true
title: 私たちが活動する場所
text: '高信頼環境: スライドデッキではなくエンジニアリングの深さを必要とする、規制された業界、大企業、製品チーム。'
items:
- pretitle: AIとプラットフォーム
  pretext: エージェント、自動化、データ
  color: '#1FA463'
  icon: brain
  title: エージェントティック AI、MCP、エンタープライズ統合
  text: 当社は、オーケストレーション、取得、評価、ガバナンスなど、ツールに安全に接続する AI システムを構築するため、脆弱になることなく自動化を拡張できます。
- pretitle: 近代化
  pretext: 麻痺なしのレガシー
  color: '#1FA463'
  icon: cog
  title: 目に見えるリスク削減を伴うレガシーの最新化
  text: 私たちは、増分移行パス (ストラングラー パターン、コントラクトファースト API、テスト ハーネス、エンジニアリング プロジェクトのように計画された運用カットオーバーなど)
    を使用して、モノリスや脆弱な統合を解きほぐします。
- pretitle: 製品エンジニアリング
  pretext: モバイルとクラウド
  color: '#1FA463'
  icon: smartphone
  title: モバイルおよびクラウドネイティブな配信
  text: Ionic、React Native、Flutter からバックエンド サービスや分析パイプラインに至るまで、当社はコア システムに適用するのと同じ基準を備えた一貫した製品エクスペリエンスを提供します。
