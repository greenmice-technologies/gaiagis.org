enable: true
title: Où nous opérons
text: 'Environnements à haut niveau de confiance : secteurs réglementés, grandes entreprises
  et équipes produit qui ont besoin d''une profondeur d''ingénierie, et non de présentations
  de diapositives.'
items:
- pretitle: IA et plateformes
  pretext: Agents, automatisation, données
  color: '#1FA463'
  icon: fas fa-brain
  title: IA agentique, MCP et intégration d'entreprise
  text: 'Nous construisons des systèmes d''IA qui se connectent à vos outils en toute
    sécurité : orchestration, récupération, évaluation et gouvernance, afin que l''automatisation
    évolue sans devenir fragile.'
- pretitle: Modernisation
  pretext: Un héritage sans paralysie
  color: '#1FA463'
  icon: fas fa-gears
  title: Modernisation de l'héritage avec réduction des risques mesurable
  text: 'Nous démêlons les monolithes et les intégrations fragiles avec des chemins
    de migration incrémentiels : modèles d''étranglement, API axées sur le contrat,
    harnais de tests et basculements opérationnels planifiés comme des projets d''ingénierie.'
- pretitle: Ingénierie produit
  pretext: Mobile et cloud
  color: '#1FA463'
  icon: fas fa-mobile-screen
  title: Livraison mobile et cloud native
  text: De Ionic, React Native et Flutter aux services backend et pipelines d'analyse,
    nous proposons des expériences produits cohérentes avec les mêmes normes que celles
    que nous appliquons aux systèmes de base.
